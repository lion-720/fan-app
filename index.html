<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
    margin: 0;
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Fan image */

#fan {
    width: 90vw;   /* very big fan */
    max-width: 420px;
    transform-origin: center center;
}

/* Spin animation */

@keyframes spin {

from { transform: rotate(0deg); }

to { transform: rotate(360deg); }

}

.spin {
    animation: spin 0.35s linear infinite;
}

/* Button */

button {

position: absolute;

bottom: 40px;

padding: 15px 35px;

font-size: 18px;

background: green;

color: white;

border: none;

border-radius: 10px;

}

</style>

</head>

<body>

<img id="fan" src="fan.png">

<button onclick="toggleFan()">ON / OFF</button>

<script>

let running = false;

function toggleFan() {

let fan = document.getElementById("fan");

if (running) {

fan.classList.remove("spin");

running = false;

}

else {

fan.classList.add("spin");

running = true;

}

}

</script>

</body>

</html>
